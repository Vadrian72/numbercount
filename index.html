<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Counter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100%; background: #fff; font-family: Georgia, serif; }

  #screen-input {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
  }

  #screen-input h1 {
    font-size: 26px;
    font-weight: normal;
    letter-spacing: 3px;
    color: #111;
  }

  #screen-input p {
    font-size: 13px;
    color: #999;
    letter-spacing: 1px;
  }

  .input-row {
    display: flex;
    align-items: center;
    border: 1.5px solid #111;
  }

  #num-input {
    width: 180px;
    height: 48px;
    font-size: 22px;
    font-family: Georgia, serif;
    text-align: center;
    border: none;
    outline: none;
    background: #fff;
    color: #111;
  }
  #num-input::placeholder { color: #ccc; }
  #num-input::-webkit-outer-spin-button,
  #num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  #num-input[type=number] { -moz-appearance: textfield; }

  #go-btn {
    width: 72px;
    height: 48px;
    font-size: 14px;
    font-family: Georgia, serif;
    letter-spacing: 2px;
    background: #111;
    color: #fff;
    border: none;
    cursor: pointer;
  }
  #go-btn:hover { background: #333; }
  #go-btn:active { background: #000; }

  #error-msg {
    font-size: 13px;
    color: #c00;
    min-height: 18px;
    letter-spacing: 0.3px;
  }

  #screen-canvas {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  #info-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: #666;
    font-family: Georgia, serif;
    letter-spacing: 0.3px;
  }

  #back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: Georgia, serif;
    color: #111;
    text-decoration: underline;
    text-underline-offset: 3px;
    padding: 0;
    margin-left: auto;
  }
  #back-btn:hover { color: #666; }

  #canvas-wrap {
    flex: 1;
    padding: 16px;
  }

  #dot-canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="screen-input">
  <h1>● CIRCLE COUNTER</h1>
  <p>câte cercuri vrei să vezi?</p>
  <div class="input-row">
    <input type="number" id="num-input" min="1" max="1000000" placeholder="100" />
    <button id="go-btn">GO</button>
  </div>
  <div id="error-msg"></div>
</div>

<div id="screen-canvas">
  <div id="info-bar">
    <span id="info-count"></span>
    <span style="color:#ddd">|</span>
    <span id="info-fits"></span>
    <button id="back-btn">← înapoi</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="dot-canvas"></canvas>
  </div>
</div>

<script>
const inputScreen = document.getElementById('screen-input');
const canvasScreen = document.getElementById('screen-canvas');
const numInput     = document.getElementById('num-input');
const goBtn        = document.getElementById('go-btn');
const backBtn      = document.getElementById('back-btn');
const errorMsg     = document.getElementById('error-msg');
const canvas       = document.getElementById('dot-canvas');
const ctx          = canvas.getContext('2d');
const infoCount    = document.getElementById('info-count');
const infoFits     = document.getElementById('info-fits');
const canvasWrap   = document.getElementById('canvas-wrap');

// Fixed circle size: radius + gap
const R    = 5;   // radius px
const GAP  = 3;   // gap between circles px
const CELL = R * 2 + GAP;

function showCircles(count) {
  // Available width = wrap padding accounted for
  const availW = canvasWrap.clientWidth - 0; // full wrap width
  const cols = Math.max(1, Math.floor(availW / CELL));
  const rows = Math.ceil(count / cols);

  const W = cols * CELL;
  const H = rows * CELL;

  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';

  const CHUNK = 50000;
  let drawn = 0;

  // How many fit in viewport (info only)
  const viewH = window.innerHeight - 60; // minus info bar
  const fitsOnScreen = cols * Math.floor(viewH / CELL);

  infoCount.textContent = count.toLocaleString('ro-RO') + ' cercuri';
  if (count <= fitsOnScreen) {
    infoFits.textContent = 'totul vizibil pe ecran';
  } else {
    infoFits.textContent = 'scroll pentru toate';
  }

  function drawChunk() {
    const end = Math.min(drawn + CHUNK, count);
    for (let i = drawn; i < end; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = col * CELL + R + Math.floor(GAP / 2);
      const cy = row * CELL + R + Math.floor(GAP / 2);
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.fill();
    }
    drawn = end;
    if (drawn < count) requestAnimationFrame(drawChunk);
  }

  requestAnimationFrame(drawChunk);
}

goBtn.addEventListener('click', () => {
  const val = parseInt(numInput.value);
  if (!val || val < 1)      { errorMsg.textContent = 'Introdu un număr mai mare ca 0.'; return; }
  if (val > 1000000)        { errorMsg.textContent = 'Maxim 1.000.000 cercuri.'; return; }
  errorMsg.textContent = '';
  inputScreen.style.display = 'none';
  canvasScreen.style.display = 'flex';
  window.scrollTo(0, 0);
  setTimeout(() => showCircles(val), 30);
});

numInput.addEventListener('keydown', e => { if (e.key === 'Enter') goBtn.click(); });

backBtn.addEventListener('click', () => {
  canvasScreen.style.display = 'none';
  inputScreen.style.display  = 'flex';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  numInput.value = '';
  window.scrollTo(0, 0);
  numInput.focus();
});

window.addEventListener('resize', () => {
  if (canvasScreen.style.display === 'flex') {
    const val = parseInt(infoCount.textContent.replace(/\D/g, ''));
    if (val) showCircles(val);
  }
});
</script>
</body>
</html>
